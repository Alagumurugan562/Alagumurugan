<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alagu Murugan Pyro World</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    overflow:hidden;

    background:black;

    font-family:'Poppins',sans-serif;

    color:white;

    position:relative;
}

/* VIDEO BACKGROUND */

.bg-video{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    z-index:-5;
}

.bg-video video{

    width:100%;
    height:100%;

    object-fit:cover;

    filter:brightness(0.45);
}

/* COLORFUL OVERLAY */

.overlay{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:

    radial-gradient(circle at top left,
    rgba(255,0,102,0.35),
    transparent 30%),

    radial-gradient(circle at top right,
    rgba(0,204,255,0.30),
    transparent 30%),

    radial-gradient(circle at bottom left,
    rgba(255,204,0,0.30),
    transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(0,255,128,0.25),
    transparent 30%),

    radial-gradient(circle at center,
    rgba(255,102,0,0.20),
    rgba(0,0,0,0.88));

    animation:colorMove 10s ease-in-out infinite alternate;

    z-index:-4;
}

@keyframes colorMove{

    0%{
        filter:hue-rotate(0deg);
    }

    100%{
        filter:hue-rotate(40deg);
    }
}

/* SKYSHOTS */

.skyshots{

    position:fixed;

    width:100%;
    height:100%;

    top:0;
    left:0;

    overflow:hidden;

    z-index:-3;
}

.skyshots span{

    position:absolute;

    bottom:-250px;

    width:5px;

    height:220px;

    border-radius:50px;

    background:
    linear-gradient(
    to top,
    rgba(255,255,255,0),
    #ff00cc,
    #00ccff,
    #ffcc00,
    #ff3300,
    white);

    box-shadow:
    0 0 20px #ff6600,
    0 0 40px #ff3300,
    0 0 80px red;

    animation:skyshot 6s linear infinite;
}

.skyshots span:nth-child(1){
    left:10%;
    animation-delay:0s;
}

.skyshots span:nth-child(2){
    left:25%;
    animation-delay:2s;
}

.skyshots span:nth-child(3){
    left:45%;
    animation-delay:1s;
}

.skyshots span:nth-child(4){
    left:65%;
    animation-delay:3s;
}

.skyshots span:nth-child(5){
    left:85%;
    animation-delay:4s;
}

@keyframes skyshot{

    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-140vh);
        opacity:0;
    }
}

/* FIREWORK BLASTS */

.blast{

    position:absolute;

    width:12px;
    height:12px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    #ffcc00,
    #ff3300,
    #ff00cc);

    box-shadow:
    0 0 10px #ffcc00,
    0 0 20px #ff6600,
    0 0 40px #ff3300,
    0 0 80px red;

    animation:blast 4s infinite;
}

.blast:nth-child(1){
    top:20%;
    left:15%;
    animation-delay:0s;
}

.blast:nth-child(2){
    top:35%;
    left:75%;
    animation-delay:1s;
}

.blast:nth-child(3){
    top:70%;
    left:30%;
    animation-delay:2s;
}

.blast:nth-child(4){
    top:18%;
    left:90%;
    animation-delay:3s;
}

.blast:nth-child(5){
    top:60%;
    left:55%;
    animation-delay:1.5s;
}

@keyframes blast{

    0%{
        transform:scale(0);
        opacity:1;
    }

    70%{
        transform:scale(12);
        opacity:0.8;
    }

    100%{
        transform:scale(18);
        opacity:0;
    }
}

/* HERO */

.hero{

    width:100%;
    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:20px;
}

/* CONTENT */

.content{

    max-width:1000px;

    animation:fadeIn 2s ease;
}

/* SHOP NAME */

.content h1{

    font-family:'Orbitron',sans-serif;

    font-size:95px;

    line-height:1.1;

    text-transform:uppercase;

    letter-spacing:5px;

    color:#ffcc00;

    animation:glow 2s ease-in-out infinite alternate;

    text-shadow:
    0 0 10px #ffcc00,
    0 0 20px #ff9900,
    0 0 40px #ff6600,
    0 0 80px #ff3300,
    0 0 120px red;
}

@keyframes glow{

    from{

        text-shadow:
        0 0 10px #ffcc00,
        0 0 20px #ff9900,
        0 0 40px #ff6600;
    }

    to{

        text-shadow:
        0 0 20px #fff,
        0 0 40px #ffcc00,
        0 0 80px #ff6600,
        0 0 120px red;
    }
}

/* GLOW LINE */

.line{

    width:300px;

    height:5px;

    margin:35px auto;

    border-radius:50px;

    background:
    linear-gradient(
    to right,
    transparent,
    #ffcc00,
    #ff3300,
    transparent);

    box-shadow:
    0 0 25px orange;
}

/* SUBTEXT */

.content p{

    font-size:24px;

    line-height:1.9;

    color:#f5f5f5;
}

/* WHATSAPP BUTTON */

.whatsapp{

    display:inline-block;

    margin-top:45px;

    padding:20px 55px;

    border-radius:70px;

    background:#25D366;

    color:white;

    text-decoration:none;

    font-size:24px;

    font-weight:600;

    border:none;

    cursor:pointer;

    box-shadow:
    0 0 20px rgba(37,211,102,0.5),
    0 0 40px rgba(37,211,102,0.4);

    transition:0.4s;
}

.whatsapp:hover{

    transform:scale(1.1);

    box-shadow:
    0 0 35px rgba(37,211,102,1),
    0 0 70px rgba(37,211,102,0.8);
}

/* CLICK BLAST EFFECT */

.click-blast{

    position:fixed;

    width:20px;
    height:20px;

    border-radius:50%;

    background:#ffcc00;

    pointer-events:none;

    transform:translate(-50%,-50%);

    animation:clickBlast 1s ease-out forwards;

    z-index:9999;
}

@keyframes clickBlast{

    0%{
        transform:translate(-50%,-50%) scale(0);
        opacity:1;
    }

    100%{
        transform:translate(-50%,-50%) scale(25);
        opacity:0;
    }
}

/* FADE */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:768px){

    .content h1{
        font-size:48px;
    }

    .content p{
        font-size:18px;
    }

    .whatsapp{
        font-size:18px;
        padding:16px 35px;
    }

    .line{
        width:180px;
    }
}

</style>

</head>
