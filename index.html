<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AlaguMurugan Pyro World</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Cinzel:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Cinzel', serif;
    color:white;

    /* DARK PREMIUM BACKGROUND */
    background: radial-gradient(circle at top,
    #1a0033,
    #000000 60%,
    #000000);
}

/* SKY DARK GLOW */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-3;

    background:
    radial-gradient(circle at top left, rgba(255,0,150,0.25), transparent 40%),
    radial-gradient(circle at top right, rgba(0,200,255,0.20), transparent 40%),
    radial-gradient(circle at bottom, rgba(255,255,0,0.10), transparent 60%);
}

/* SKYSHOTS (ROCKET STYLE) */
.skyshots{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
}

.skyshots span{
    position:absolute;
    bottom:-200px;
    width:3px;
    height:180px;
    border-radius:50px;

    background: linear-gradient(to top,
    transparent,
    #ff004c,
    #ffcc00,
    #00e5ff,
    white);

    box-shadow:0 0 20px #ff004c,0 0 40px #00e5ff;

    animation:rocket 4s linear infinite;
}

.skyshots span:nth-child(1){left:10%; animation-delay:0s;}
.skyshots span:nth-child(2){left:25%; animation-delay:1s;}
.skyshots span:nth-child(3){left:45%; animation-delay:0.5s;}
.skyshots span:nth-child(4){left:65%; animation-delay:1.5s;}
.skyshots span:nth-child(5){left:85%; animation-delay:2s;}

@keyframes rocket{
    0%{
        transform:translateY(0) scaleY(1);
        opacity:1;
    }
    100%{
        transform:translateY(-160vh) scaleY(1.3);
        opacity:0;
    }
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.content{
    max-width:900px;
}

/* UNIQUE TITLE */
.content h1{
    font-family:'Orbitron',sans-serif;
    font-size:80px;
    font-weight:900;

    background: linear-gradient(45deg,#ffcc00,#ff004c,#00e5ff,#ffcc00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:glow 2s infinite alternate;

    text-shadow:0 0 25px rgba(255,255,255,0.2);
}

@keyframes glow{
    from{
        filter:drop-shadow(0 0 10px #ff004c);
    }
    to{
        filter:drop-shadow(0 0 30px #00e5ff);
    }
}

/* LINE */
.line{
    width:300px;
    height:4px;
    margin:25px auto;
    border-radius:50px;
    background:linear-gradient(to right,#ff004c,#ffcc00,#00e5ff);
    box-shadow:0 0 20px #ff004c;
}

/* TEXT */
.content p{
    font-size:20px;
    line-height:1.8;
    color:#e6e6e6;
}

/* BUTTON */
.whatsapp{
    margin-top:40px;
    padding:18px 50px;
    border-radius:50px;
    border:none;
    background:linear-gradient(45deg,#25D366,#00e5ff);
    color:white;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 0 25px #25D366;
    transition:0.3s;
}

.whatsapp:hover{
    transform:scale(1.1);
    box-shadow:0 0 50px #00e5ff;
}

/* MOBILE */
@media(max-width:768px){
    .content h1{font-size:42px;}
    .content p{font-size:16px;}
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- SKY ROCKETS -->
<div class="skyshots">
<span></span><span></span><span></span><span></span><span></span>
</div>

<section class="hero">

<div class="content">

<h1>🔥 ALAGUMURUGAN<br>PYRO WORLD 🔥</h1>

<div class="line"></div>

<p>
Premium Sivakasi Crackers <br>
Wholesale & Retail Available <br>
Festival Offers • Safe Delivery • Best Price
</p>

<button class="whatsapp" onclick="openWhatsApp(event)">
📲 Order On WhatsApp
</button>

</div>

</section>

<script>
function openWhatsApp(event){

    let blast=document.createElement("div");

    blast.style.position="fixed";
    blast.style.left=event.clientX+"px";
    blast.style.top=event.clientY+"px";
    blast.style.width="15px";
    blast.style.height="15px";
    blast.style.borderRadius="50%";
    blast.style.background="radial-gradient(circle,#ffcc00,#ff004c)";
    blast.style.boxShadow="0 0 20px yellow";
    blast.style.animation="fade 1s ease-out forwards";

    document.body.appendChild(blast);

    setTimeout(()=>{
        blast.remove();
        window.open("https://wa.me/919363705144","_blank");
    },600);
}
</script>

</body>
</html>
